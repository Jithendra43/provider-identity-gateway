server:
  port: 8082
  http2:
    enabled: true
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: routing-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    serialization:
      write-dates-as-timestamps: false

tefca:
  services:
    directory-cache-url: http://${DIRECTORY_CACHE_HOST:localhost}:${DIRECTORY_CACHE_PORT:8083}
  timeouts:
    endpoint-resolution-ms: 2000
    forward-ms: 25000
    total-ms: 30000

resilience4j:
  circuitbreaker:
    instances:
      forwardCircuit:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  timelimiter:
    instances:
      forwardTimeLimiter:
        timeout-duration: 25s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,loggers,configprops,beans,mappings
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    chit.tefca: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
