server:
  port: 8080
  http2:
    enabled: true
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    context-path: /
  tomcat:
    max-http-form-post-size: 10MB

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: ingress-auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tefca_gateway}
    username: ${POSTGRES_USER:tefca}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: ingress

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ingress
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # Use jwk-set-uri (no OIDC discovery network call); falls back to
          # the in-process mock IdP for cost-min single-task deployments.
          jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://127.0.0.1:8080/oauth2/.well-known/jwks.json}
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080}
          audiences: ${OAUTH2_AUDIENCE:tefca-gateway}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,loggers,configprops,beans,mappings
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

tefca:
  hmac:
    secret: ${TEFCA_HMAC_SECRET:}
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:100}
  security:
    replay-protection:
      # TEFCA QHIN replay defense: dedup on (jti, correlationId). Disable for
      # tests that intentionally replay the same correlation id with the same
      # token; production deployments must keep this on.
      enabled: ${TEFCA_REPLAY_PROTECTION_ENABLED:true}
  mtls:
    # Disabled by default. When true, partnerSslContext + mtlsWebClientBuilder
    # beans are created from the keystore/truststore below.
    enabled: ${TEFCA_MTLS_ENABLED:false}
    keystore:
      path: ${TEFCA_MTLS_KEYSTORE_PATH:}
      password: ${TEFCA_MTLS_KEYSTORE_PASSWORD:}
      type: ${TEFCA_MTLS_KEYSTORE_TYPE:PKCS12}
    truststore:
      path: ${TEFCA_MTLS_TRUSTSTORE_PATH:}
      password: ${TEFCA_MTLS_TRUSTSTORE_PASSWORD:}
      type: ${TEFCA_MTLS_TRUSTSTORE_TYPE:PKCS12}
  services:
    policy-url: ${POLICY_SERVICE_URL:http://localhost:8081}
    routing-url: ${ROUTING_SERVICE_URL:http://localhost:8082}
    directory-url: ${DIRECTORY_SERVICE_URL:http://localhost:8083}
  timeouts:
    policy-ms: 2000
    routing-ms: 2000
    forward-ms: 25000
    total-ms: 30000
  admin:
    # Mock OIDC issuer used for local dev login. In prod, replace with a real
    # OIDC token endpoint and switch ADMIN_AUTH_MODE=oidc.
    auth-mode: ${ADMIN_AUTH_MODE:mock}
    mock-token-url: ${ADMIN_MOCK_TOKEN_URL:http://localhost:8090/token}
    cookie-name: ${ADMIN_COOKIE_NAME:tefca_admin_token}
    cookie-secure: ${ADMIN_COOKIE_SECURE:false}
    cookie-max-age-seconds: ${ADMIN_COOKIE_MAX_AGE:7200}
    required-role: ${ADMIN_REQUIRED_ROLE:QHIN_ADMIN}
    # Pre-provisioned dev operators. Each entry maps a username to its password
    # and default org/node/roles. In prod these come from the OIDC IdP instead.
    operators:
      - username: "admin@local"
        password: ${ADMIN_PASSWORD:tefca-admin}
        org-id: ORG-QHIN-001
        node-id: NODE-CW-001
        roles: QHIN_ADMIN
        display-name: Default Admin
      - username: "operator@local"
        password: ${OPERATOR_PASSWORD:tefca-operator}
        org-id: ORG-QHIN-001
        node-id: NODE-CW-001
        roles: QHIN_OPERATOR
        display-name: Default Operator
      - username: "auditor@local"
        password: ${AUDITOR_PASSWORD:tefca-auditor}
        org-id: ORG-QHIN-001
        node-id: NODE-CW-001
        roles: QHIN_AUDITOR
        display-name: Default Auditor
    proxy:
      # Allow-list of downstream services and path prefixes the admin proxy may forward to.
      services:
        policy: ${POLICY_SERVICE_URL:http://localhost:8081}
        routing: ${ROUTING_SERVICE_URL:http://localhost:8082}
        directory: ${DIRECTORY_SERVICE_URL:http://localhost:8083}
        ingress: http://localhost:${server.port:8080}

logging:
  level:
    root: INFO
    chit.tefca: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
