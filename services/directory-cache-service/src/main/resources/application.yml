server:
  port: 8083
  http2:
    enabled: true
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: directory-cache-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tefca_gateway}
    username: ${POSTGRES_USER:tefca}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: directory

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: directory
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

tefca:
  directory:
    sync-interval-ms: 3600000
    sync-initial-delay-ms: 60000
    sync-enabled: ${DIRECTORY_SYNC_ENABLED:false}
    sync-timeout-seconds: 300
    cache-ttl-minutes: 30
    source-url: ${DIRECTORY_SOURCE_URL:https://rce.sequoiaproject.org/directory}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,loggers,configprops,beans,mappings
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    chit.tefca: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
