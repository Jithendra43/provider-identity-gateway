spring:
  datasource:
    url: jdbc:h2:mem:testdb;INIT=CREATE SCHEMA IF NOT EXISTS DIRECTORY
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: directory
  flyway:
    enabled: false

tefca:
  directory:
    sync-interval-ms: 86400000
    sync-enabled: false
    source-url: https://test.example.com/directory
