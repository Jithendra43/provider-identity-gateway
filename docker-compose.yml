services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tefca_gateway
      POSTGRES_USER: tefca
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 00_init.sh applies prod-equivalent migrations first, then compose-only
      # overlays. Prod-equivalent source:
      # services/tefca-gateway-app/src/main/resources/db/migration/
      - ./database/00_init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
      - ./services/tefca-gateway-app/src/main/resources/db/migration:/docker-entrypoint-initdb.d/migrations:ro
      - ./services/tefca-gateway-app/src/main/resources/db/compose-migration:/docker-entrypoint-initdb.d/compose-migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tefca -d tefca_gateway"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ─── Test harness: mock partner QHIN endpoints ─────────────────────────────
  wiremock:
    image: wiremock/wiremock:3.9.1
    ports:
      - "8888:8080"
    volumes:
      - ./test-harness/wiremock:/home/wiremock:ro
    command: ["--global-response-templating", "--verbose"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ─── Test harness: mock OIDC issuer ────────────────────────────────────────
  mock-jwt:
    build:
      context: ./test-harness/mock-jwt
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8090/.well-known/jwks.json\").status==200 else 1)'"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ─── mTLS edge: NGINX terminates TLS 1.3 + verifies QHIN client certs ──────
  # Public ingress is HTTPS-only on :8443 with mutual TLS, mirroring the
  # production AWS ALB. ingress-auth-service has no host port — the only way
  # in is through this sidecar, which forwards the verified client cert in
  # X-Client-Cert for PartnerTrustStore to evaluate.
  nginx-mtls:
    image: nginx:1.27-alpine
    ports:
      - "8443:8443"   # Partner edge — TLS 1.3 + mTLS  (production: partner ALB)
      - "8444:8444"   # Admin edge   — TLS 1.3 only    (production: admin/mgmt ALB)
    volumes:
      - ./test-harness/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./test-harness/certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./test-harness/certs/server.key:/etc/nginx/certs/server.key:ro
      - ./test-harness/certs/rootCA.crt:/etc/nginx/certs/rootCA.crt:ro
    depends_on:
      ingress-auth-service: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:8443/sidecar/health 2>/dev/null | grep -q healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ─── Application services ──────────────────────────────────────────────────
  # ingress-auth-service is no longer reachable from the host directly — all
  # external traffic must go through nginx-mtls on :8443. Inside the docker
  # network it still listens on :8080 plain HTTP; nginx-mtls is the only TLS
  # peer, exactly like the ALB → ECS task pattern in production.
  ingress-auth-service:
    build:
      context: ./services/ingress-auth-service
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: compose
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tefca_gateway
      POSTGRES_USER: tefca
      POSTGRES_PASSWORD: changeme
      OAUTH2_ISSUER_URI: http://mock-jwt:8090
      OAUTH2_AUDIENCE: tefca-gateway
      POLICY_SERVICE_URL: http://policy-service:8081
      ROUTING_SERVICE_URL: http://routing-service:8082
      DIRECTORY_SERVICE_URL: http://directory-cache-service:8083
      ADMIN_MOCK_TOKEN_URL: http://mock-jwt:8090/token
      # ── Production-style security flags ───────────────────────────────────
      TEFCA_MTLS_ENABLED: "true"
      TEFCA_MTLS_STRICT: "true"
      TEFCA_REPLAY_PROTECTION_ENABLED: "true"
      TEFCA_HMAC_SECRET: ${TEFCA_HMAC_SECRET:-local-dev-hmac-secret-change-me}
    depends_on:
      postgres:                { condition: service_healthy }
      mock-jwt:                { condition: service_healthy }
      policy-service:          { condition: service_started }
      routing-service:         { condition: service_started }
      directory-cache-service: { condition: service_started }

  policy-service:
    build:
      context: ./services/policy-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: compose
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tefca_gateway
      POSTGRES_USER: tefca
      POSTGRES_PASSWORD: changeme
    depends_on:
      postgres: { condition: service_healthy }

  routing-service:
    build:
      context: ./services/routing-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: compose
      DIRECTORY_CACHE_HOST: directory-cache-service
      DIRECTORY_CACHE_PORT: 8083
    depends_on:
      directory-cache-service: { condition: service_started }

  directory-cache-service:
    build:
      context: ./services/directory-cache-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: compose
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: tefca_gateway
      POSTGRES_USER: tefca
      POSTGRES_PASSWORD: changeme
    depends_on:
      postgres: { condition: service_healthy }
      wiremock: { condition: service_healthy }

volumes:
  pgdata:

networks:
  default:
    external: true
    name: chit-integration-net