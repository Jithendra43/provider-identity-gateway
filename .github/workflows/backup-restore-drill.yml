name: Backup/Restore Drill (RDS)

# HIPAA §164.308(a)(7)(ii)(B) — "Establish and implement procedures to
# restore any loss of data". This workflow exercises the full backup ⇒
# pg_restore ⇒ smoke-query loop daily so we have evidence the chain works
# *before* we need it. Only runs against the non-prod RDS instance; the
# restore lands in an ephemeral H2-on-disk database to keep the drill
# self-contained and avoid double-billing.

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # OIDC for AWS

jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: drill
          POSTGRES_DB: tefca_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKUP_DRILL_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Locate latest automated snapshot
        id: snap
        run: |
          SNAP=$(aws rds describe-db-snapshots \
            --db-instance-identifier tefca-staging \
            --snapshot-type automated \
            --query 'reverse(sort_by(DBSnapshots, &SnapshotCreateTime))[0].DBSnapshotIdentifier' \
            --output text)
          echo "snapshot=$SNAP" >> "$GITHUB_OUTPUT"

      - name: Export snapshot to S3 (parquet)
        run: |
          aws rds start-export-task \
            --export-task-identifier "drill-$(date +%Y%m%d%H%M%S)" \
            --source-arn "arn:aws:rds:us-east-1:${{ secrets.AWS_ACCOUNT_ID }}:snapshot:${{ steps.snap.outputs.snapshot }}" \
            --s3-bucket-name "${{ secrets.BACKUP_DRILL_BUCKET }}" \
            --iam-role-arn "${{ secrets.AWS_BACKUP_EXPORT_ROLE_ARN }}" \
            --kms-key-id "${{ secrets.BACKUP_DRILL_KMS_KEY }}" \
            --export-only "tefca_gateway.policy" "tefca_gateway.audit" \
            > export.json
          echo "Export task started: $(jq -r '.ExportTaskIdentifier' export.json)"

      # The export takes 5-15 min for typical staging dataset. Poll instead of
      # a fixed sleep so the drill fails fast on AWS-side errors.
      - name: Wait for export completion
        run: |
          TASK=$(jq -r '.ExportTaskIdentifier' export.json)
          for i in {1..60}; do
            STATUS=$(aws rds describe-export-tasks --export-task-identifier "$TASK" \
              --query 'ExportTasks[0].Status' --output text)
            echo "[$i] export status: $STATUS"
            case "$STATUS" in
              COMPLETE) exit 0 ;;
              FAILED|CANCELED) echo "::error::Export $STATUS"; exit 1 ;;
            esac
            sleep 30
          done
          echo "::error::Export timeout after 30m"
          exit 1

      # Restore via pg_dump from a live read-replica is faster + cheaper than
      # round-tripping through S3-Parquet for the smoke check. We use it as
      # the secondary path so we exercise both restore mechanisms.
      - name: Logical dump from staging replica
        env:
          PGPASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          pg_dump \
            -h ${{ secrets.STAGING_DB_REPLICA_HOST }} \
            -U ${{ secrets.STAGING_DB_USER }} \
            -d tefca_gateway \
            --schema=policy --schema=audit \
            --no-owner --no-acl \
            -F c -f staging.dump

      - name: Restore into ephemeral postgres
        env:
          PGPASSWORD: drill
        run: |
          pg_restore \
            -h localhost -U postgres -d tefca_restore \
            --no-owner --no-acl \
            staging.dump

      - name: Smoke queries
        env:
          PGPASSWORD: drill
        run: |
          PSQL="psql -h localhost -U postgres -d tefca_restore -tAc"

          POLICY_COUNT=$($PSQL "SELECT count(*) FROM policy.policy_audit_entries")
          AUDIT_COUNT=$($PSQL "SELECT count(*) FROM audit.audit_events")
          LATEST=$($PSQL "SELECT max(created_at) FROM audit.audit_events")

          echo "policy.policy_audit_entries: $POLICY_COUNT rows"
          echo "audit.audit_events:          $AUDIT_COUNT rows"
          echo "audit.audit_events latest:   $LATEST"

          # Drill thresholds: row counts must be within sane bounds and the
          # latest audit event must be < 24h old. A stale dump = silent
          # backup-pipeline failure that bypasses RDS-level alarms.
          if [ "$AUDIT_COUNT" -lt 1 ]; then
            echo "::error::Audit table empty after restore — backup integrity failure"
            exit 1
          fi

          STALE=$($PSQL "SELECT EXTRACT(EPOCH FROM (now() - max(created_at)))::int > 86400 FROM audit.audit_events")
          if [ "$STALE" = "t" ]; then
            echo "::error::Latest audit event is >24h old in restored snapshot"
            exit 1
          fi

      - name: Tabletop log
        if: always()
        run: |
          {
            echo "## Backup/Restore Drill — $(date -u)"
            echo "- Snapshot: ${{ steps.snap.outputs.snapshot }}"
            echo "- Outcome: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rotating_light: TEFCA backup/restore drill FAILED. HIPAA §164.308(a)(7) compliance evidence broken. See ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SECOPS_SLACK_WEBHOOK }}
