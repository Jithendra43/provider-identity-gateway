name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS:   '-Xmx1024m'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  temurin
          cache:         maven

      - name: Build and test
        run: mvn clean verify -B -ntp
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: services/**/target/surefire-reports/

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: services/**/target/site/jacoco/

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      MAVEN_OPTS: '-Xmx2048m'
    defaults:
      run:
        working-directory: services

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  temurin
          cache:         maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: OWASP dependency check
        run: |
          mvn org.owasp:dependency-check-maven:check -B -ntp \
            -Ddependency-check.retryCount=3 \
            -Ddependency-check.failBuildOnError=false \
            -Ddependency-check.dataDirectory="${HOME}/.m2/repository/org/owasp/dependency-check-data"

      - name: SpotBugs static analysis
        run: mvn spotbugs:check -B -ntp


