name: infra-apply
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'infra/eks/**'
      - '.github/workflows/infra-apply.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod        # GH protection rule = manual approval
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.5 }

      - uses: azure/setup-helm@v4

      - working-directory: infra/terraform/envs/prod
        run: |
          terraform init -backend-config=backend.hcl
          terraform apply -auto-approve

      - name: Apply EKS add-ons (ALB controller + External Secrets)
        working-directory: infra/eks
        run: |
          terraform init
          terraform apply -auto-approve
