# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — TLS-terminating mTLS sidecar in front of ingress-auth-service
# ─────────────────────────────────────────────────────────────────────────────
# Models the production AWS ALB:
#   • TLS 1.3 only, ciphers restricted to AEAD AES-GCM
#   • Mutual TLS — client must present a cert chained to /etc/nginx/certs/rootCA.crt
#   • Forwards the verified client cert (URL-encoded PEM) to the upstream
#     Spring service in the X-Client-Cert header that MtlsValidationFilter
#     and PartnerTrustStore consume.
#   • Rejects every request that did not negotiate a successful client-cert
#     handshake with HTTP 495 (NGINX) — defense-in-depth alongside
#     ssl_verify_client=on which already aborts the TLS handshake.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    log_format mtls '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'verify=$ssl_client_verify '
                    'subject="$ssl_client_s_dn" '
                    'fp_sha256=$ssl_client_fingerprint';
    access_log /var/log/nginx/access.log mtls;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    upstream tefca_ingress {
        server ingress-auth-service:8080;
        keepalive 32;
    }

    server {
        listen 8443 ssl;
        http2 on;
        server_name localhost tefca-ingress;

        # ── Server identity ──
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── Client trust anchor (TEFCA local root CA) ──
        ssl_client_certificate /etc/nginx/certs/rootCA.crt;
        # `optional_no_ca` lets a request reach NGINX even without a cert
        # (so /sidecar/health works for the docker healthcheck), but the `/`
        # location below 495s any request that did not actually verify.
        ssl_verify_client      optional;
        ssl_verify_depth       2;

        # ── Protocol hardening (matches ALB ELBSecurityPolicy-TLS13-1-2-2021-06) ──
        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;
        ssl_session_tickets off;

        # NB: ssl_verify_client is `optional_no_ca` here so /sidecar/health
        # remains reachable without a client cert. Real enforcement is done
        # per-location below via $ssl_client_verify checks. The location that
        # forwards to the Spring service requires SUCCESS or returns 495.

        # ── Forward to the Spring ingress service ──
        location / {
            # Block any request that did not present a verified client cert.
            if ($ssl_client_verify != SUCCESS) {
                return 495;  # NGINX-specific: SSL Certificate Error
            }

            proxy_pass http://tefca_ingress;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Standard forwarding headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # ── mTLS attribution headers consumed by ingress-auth-service ──
            #   X-Client-Cert    : URL-encoded PEM of the verified client cert.
            #   X-Client-Verify  : SUCCESS / FAILED (the filter rejects anything
            #                      other than SUCCESS as defense-in-depth).
            #   X-Client-DN      : full subject distinguished name.
            #   X-Client-FP-SHA1 : NGINX-native SHA-1 fingerprint (the Java
            #                      side computes its own SHA-256 from the PEM).
            proxy_set_header X-Client-Cert     $ssl_client_escaped_cert;
            proxy_set_header X-Client-Verify   $ssl_client_verify;
            proxy_set_header X-Client-DN       $ssl_client_s_dn;
            proxy_set_header X-Client-FP-SHA1  $ssl_client_fingerprint;

            proxy_connect_timeout 5s;
            proxy_read_timeout    35s;
            proxy_send_timeout    35s;
        }

        # Always-allow path so a client without a cert can still tell whether
        # the sidecar itself is alive (mirrors ALB's /actuator/health on
        # the unauthenticated listener — we just always reject pre-handshake).
        location = /sidecar/health {
            return 200 'mtls-sidecar healthy\n';
            add_header Content-Type text/plain;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # ADMIN LISTENER — :8444
    # ─────────────────────────────────────────────────────────────────────────
    # Models the production AWS dual-listener pattern:
    #   • Partner ALB     :443  → mTLS, partner endpoints only (the :8443 server above)
    #   • Admin/Mgmt ALB  :443  → TLS only, OIDC/SSO + IP allowlist, admin endpoints only
    # Locally we publish the admin edge on :8444 so an operator can reach the
    # Next.js admin UI in a browser (HTTPS, no client cert required) while
    # partners stay strictly on the mTLS edge.
    server {
        listen 8444 ssl;
        http2 on;
        server_name localhost tefca-admin;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL_ADMIN:10m;
        ssl_session_timeout 1h;
        ssl_session_tickets off;

        # HSTS — same as the AWS ALB
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

        # Only admin paths are exposed here; everything else 404s. This is the
        # explicit equivalent of the path-based listener-rule on the admin ALB.
        location ~ ^/(admin/?|admin/.*|api/admin/.*|actuator/.*|favicon\.ico)$ {
            proxy_pass http://tefca_ingress;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port  8444;
            # Tell the Spring app this request did NOT come through the
            # mTLS listener so the auth filter knows to use cookie/OIDC auth.
            proxy_set_header X-Edge            "admin";

            proxy_connect_timeout 5s;
            proxy_read_timeout    35s;
            proxy_send_timeout    35s;
        }

        location = /sidecar/health {
            return 200 'admin-sidecar healthy\n';
            add_header Content-Type text/plain;
        }

        location / { return 404; }
    }
}
