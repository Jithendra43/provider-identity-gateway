# ConfigMap for the tefca-gateway pod.
# Apply with: kubectl apply -f infra/k8s/00-configmap.yaml
# Secrets (DB creds, HMAC, Cognito client-secret, Redis auth token) are in
# separate ExternalSecret-managed k8s Secrets, not here.
#
# Variables already templated with ${...} are substituted by the CI/CD pipeline via:
# envsubst < infra/k8s/00-configmap.yaml | kubectl apply -f -
apiVersion: v1
kind: ConfigMap
metadata:
  name: tefca-gateway-config
  namespace: tefca
data:
  # Spring profile - must be prod in EKS.
  SPRING_PROFILES_ACTIVE: "prod"

  # Runtime region and app buckets.
  AWS_REGION: "${AWS_REGION}"
  AUDIT_BUCKET: "${AUDIT_BUCKET}"

  # JVM tuning.
  JAVA_TOOL_OPTIONS: >-
    -XX:MaxRAMPercentage=70
    -Djava.security.egd=file:/dev/./urandom

  # Cognito OIDC for admin OAuth2 login flow.
  COGNITO_ISSUER_URI: "${COGNITO_ISSUER_URI}"
  COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
  COGNITO_AUDIENCE: "${COGNITO_AUDIENCE}"
  COGNITO_DOMAIN: "${COGNITO_DOMAIN}"

  # Partner OIDC values for resource-server JWT validation.
  OAUTH2_ISSUER_URI: "${OAUTH2_ISSUER_URI}"
  OAUTH2_JWK_SET_URI: "${OAUTH2_JWK_SET_URI}"
  OAUTH2_AUDIENCE: "${OAUTH2_AUDIENCE}"

  # Existing app JWT variables.
  JWT_ISSUER_URI: "${JWT_ISSUER_URI}"
  JWT_AUDIENCE: "${JWT_AUDIENCE}"

  # Flyway startup migrations.
  FLYWAY_ENABLED: "true"

  # Proxy service URLs — all four logical services are co-located in the same
  # JVM on port 8080 in the single-deployable gateway. Without these the dev
  # defaults (8081/8082/8083) leak through and the dashboard shows all services
  # as DOWN. application-prod.yml also sets these; the env vars are belt-and-
  # suspenders in case the profile is not loaded before the bean is wired.
  POLICY_SERVICE_URL: "http://127.0.0.1:8080"
  ROUTING_SERVICE_URL: "http://127.0.0.1:8080"
  DIRECTORY_SERVICE_URL: "http://127.0.0.1:8080"

  # Enforce secure admin cookies in prod.
  ADMIN_COOKIE_SECURE: "true"

  # Spring Session + Redis.
  # Default: SESSION_STORE_TYPE is absent -> in-memory sessions.
  # Enable only after Redis is verified from pod:
  # SESSION_STORE_TYPE: "redis"

  # Optional Redis TLS override (default true in application-prod.yml):
  # REDIS_TLS_ENABLED: "false"

  # Optional SNS topic for cert-expiry alert publisher.
  TEFCA_ALERTS_SNS_TOPIC_ARN: "${TEFCA_ALERTS_SNS_TOPIC_ARN}"

  # Logging verbosity for auth troubleshooting.
  SECURITY_LOG_LEVEL: "WARN"

  # ─────────────────────────────────────────────────────────────────────────
  # In-app test IdP (MockIdpController @ /oauth2/token + /oauth2/.well-known)
  # ─────────────────────────────────────────────────────────────────────────
  # The /oauth2/.well-known/jwks.json endpoint is ALWAYS published — it backs
  # the InternalTokenIssuer used during PA forwarding. Only the /token mint
  # endpoint is gated.
  #
  # In real prod this MUST stay "false" (no test-only mint endpoint exposed).
  # Override to "true" in the dedicated test env so the e2e harness can
  # mint partner JWTs via /api/admin/proxy/ingress/oauth2/token.
  # See: services/ingress-auth-service/src/main/java/chit/tefca/ingress/mockidp/MockIdpController.java
  TEFCA_TEST_IDP_TOKEN_ENDPOINT_ENABLED: "${TEFCA_TEST_IDP_TOKEN_ENDPOINT_ENABLED:-false}"
  TEFCA_TEST_IDP_ISSUER_URI: "${TEFCA_TEST_IDP_ISSUER_URI:-${OAUTH2_ISSUER_URI}}"
  TEFCA_TEST_IDP_AUDIENCE:   "${TEFCA_TEST_IDP_AUDIENCE:-${OAUTH2_AUDIENCE}}"
