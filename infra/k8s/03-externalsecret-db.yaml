# Secret name must match Terraform aws_secretsmanager_secret.db (${NAME_PREFIX}/db).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-db
  namespace: tefca
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: gateway-db
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: ${NAME_PREFIX}/db
        property: url
    - secretKey: DB_USERNAME
      remoteRef:
        key: ${NAME_PREFIX}/db
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: ${NAME_PREFIX}/db
        property: password
