# HMAC secret is now stored in Secrets Manager (auto-generated by Terraform).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-hmac
  namespace: tefca
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: gateway-hmac
    creationPolicy: Owner
  data:
    - secretKey: HMAC_SECRET
      remoteRef:
        key: ${NAME_PREFIX}/hmac/secret
---
# Cognito client secret remains in SSM Parameter Store.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-ssm
  namespace: tefca
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  target:
    name: gateway-ssm
    creationPolicy: Owner
  data:
    - secretKey: COGNITO_CLIENT_SECRET
      remoteRef:
        key: /${NAME_PREFIX}/cognito/client-secret
    # Redis hostname — stored as a plain SSM String by Terraform when the
    # ElastiCache cluster is provisioned.  Value is the primary endpoint
    # address only (no port; port is always 6379).
    - secretKey: REDIS_HOST
      remoteRef:
        key: /${NAME_PREFIX}/redis/host
---
# Redis AUTH token — stored in Secrets Manager (KMS-encrypted, matches the
# token configured on the ElastiCache replication group).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-redis
  namespace: tefca
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: gateway-redis
    creationPolicy: Owner
  data:
    - secretKey: REDIS_AUTH_TOKEN
      remoteRef:
        key: ${NAME_PREFIX}/redis
        property: auth_token
