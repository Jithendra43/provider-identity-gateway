# HMAC secret is now stored in Secrets Manager (auto-generated by Terraform).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-hmac
  namespace: tefca
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: gateway-hmac
    creationPolicy: Owner
  data:
    - secretKey: HMAC_SECRET
      remoteRef:
        key: ${NAME_PREFIX}/hmac/secret
---
# Cognito client secret remains in SSM Parameter Store.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-ssm
  namespace: tefca
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  target:
    name: gateway-ssm
    creationPolicy: Owner
  data:
    - secretKey: COGNITO_CLIENT_SECRET
      remoteRef:
        key: /${NAME_PREFIX}/cognito/client-secret
